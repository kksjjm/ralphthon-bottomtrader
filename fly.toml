app = "ralphthon-bottomtrader-bot"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[processes]
  bot = "python -m src.bot"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  processes = ["bot"]

[deploy]
  # Rolling deploy: update one machine at a time, wait for it to start before next
  strategy = "rolling"
  wait_timeout = "5m"

# HTTP service for health checks (used by deploy + uptime monitoring)
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["bot"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"
