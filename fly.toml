app = "ralphthon-bottomtrader-bot"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[processes]
  bot = "python -m src.bot"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  processes = ["bot"]

[deploy]
  # Rolling: update one machine at a time. Standby takes over while primary updates.
  strategy = "rolling"
  max_unavailable = 0.0
  wait_timeout = "5m"
